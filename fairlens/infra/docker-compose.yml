services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: fairlens_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENV=development
      - PYTHONPATH=/app:/app/backend
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    restart: unless-stopped
    command: [ "/bin/sh", "/app/entrypoint.sh" ]

  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    container_name: fairlens_worker
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENV=development
      - PYTHONPATH=/app:/app/backend
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../worker:/app
      - ../backend:/app/backend
    restart: unless-stopped
    command: [ "celery", "-A", "celery_app.app", "worker", "--loglevel=info", "--pool=threads" ]

  redis:
    image: redis:7-alpine
    container_name: fairlens_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  flower:
    image: mher/flower:2.0.1
    container_name: fairlens_flower
    command: >
      celery --broker=redis://redis:6379/0
            -A celery_app.app
            flower --port=5555 --inspect
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    volumes:
      - ../worker:/app
      - ../backend:/app/backend
    working_dir: /app
    environment:
      - PYTHONPATH=/app:/app/backend
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.dev
    container_name: fairlens_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    volumes:
      - ../frontend:/app
      - /app/node_modules
    restart: unless-stopped
    command: [ "npm", "run", "dev" ]
