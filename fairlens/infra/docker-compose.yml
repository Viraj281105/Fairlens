version: '3.8'

services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fairlens_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENV=development
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    restart: unless-stopped
    command: ["/bin/sh", "/app/entrypoint.sh"]

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    container_name: fairlens_worker
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENV=development
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../worker:/app
      - ../backend/app/pipeline:/app/pipeline # Share pipeline logic with worker
    restart: unless-stopped
    command: ["celery", "-A", "celery_app.app", "worker", "--loglevel=info", "--pool=threads"]

  redis:
    image: redis:7-alpine
    container_name: fairlens_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: fairlens_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    volumes:
      - ../frontend:/app
      - /app/node_modules
    restart: unless-stopped
